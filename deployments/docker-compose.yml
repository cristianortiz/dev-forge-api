networks:
  dev-forge-net:
    driver: bridge

volumes:
  postgres_data:

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 16 — two databases: dev_forge + zitadel
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dev-forge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dev_forge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - dev-forge-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dev_forge" ]
      interval: 10s
      timeout: 5s
      retries: 5
